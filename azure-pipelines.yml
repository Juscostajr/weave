trigger:
  branches:
    include:
    - main
  paths:
    include:
    - src/** # Dispara o build se houver mudança no código do site
    - lineage-definitions/** # Dispara se houver mudança nos arquivos de definição

pool:
  vmImage: 'ubuntu-latest'

steps:
- checkout: self
  submodules: true

- task: NodeTool@0
  inputs:
    versionSpec: '20.x'
  displayName: 'Instalar Node.js'

# PASSO INJETADO: Preparar o JSON de Topologia antes do Build
- script: |
    echo "Preparando o catálogo de linhagem..."
    # Exemplo: Copiando de uma pasta de definições do repositório para o src/data
    # Se você baixasse do Azure Storage, usaria o 'az storage blob download' aqui
    cp lineage-definitions/arquitetura_atual.json src/data/openlineage-mock.json
  displayName: 'Injetar dependências estáticas'

- script: |
    npm ci
    npm run build
  displayName: 'Build do frontend estático com Vite'

- task: AzureStaticWebApp@0
  inputs:
    app_location: '/'
    api_location: ''
    output_location: 'dist'
    azure_static_web_apps_api_token: $(AZURE_STATIC_WEB_APPS_API_TOKEN)
  displayName: 'Deploy para Azure Static Web Apps'
